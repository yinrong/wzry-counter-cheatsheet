name: Build cheatsheet

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 3 * * 1'  # 每周一 UTC 03:00 自动刷新数据
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Noto CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch latest counter data from pvp.qq.com
        run: python src/fetch_data.py

      - name: Render HTML and PNG
        run: |
          python src/render_html.py
          python src/render_png.py

      - name: Commit output and data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/counters.json output/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "build: refresh counter data and cheatsheet"
            git push
          fi
